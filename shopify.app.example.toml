# Shopify CLI app config — extension preview (`shopify app dev`, `shopify app deploy`).
# Copy to shopify.app.toml and fill in values (same tunnel/HOST idea as `.env`).
# `client_id` is the Partner Dashboard “Client ID” (same value as SHOPIFY_API_KEY).
# https://shopify.dev/docs/apps/tools/cli/configuration

name = 'minishopi'
handle = 'minishopi'

client_id = 'REPLACE_WITH_CLIENT_ID_FROM_PARTNERS'

application_url = 'https://your-tunnel.trycloudflare.com/'
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[access_scopes]
scopes = 'read_products,write_products'

[auth]
redirect_urls = [
  'https://your-tunnel.trycloudflare.com/auth/callback',
]

[pos]
embedded = false

[webhooks]
api_version = '2026-04'

[[webhooks.subscriptions]]
topics = ['app/uninstalled']
uri = '/webhooks/app/uninstalled'
